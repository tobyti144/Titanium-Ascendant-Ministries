<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titanium Ascendant | Studio Equipment Intake</title>
    <style>
        :root {
            --bg-color: #08090d; --panel-bg: #12141c;
            --titanium-silver: #c0c5ce; --gold-accent: #d4af37;
            --text-main: #e2e8f0;
            --text-muted: #8b96a5;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); padding: 4rem 2rem; }
        .form-container { max-width: 600px; margin: 0 auto 3rem; background: var(--panel-bg); padding: 2rem; border-top: 3px solid var(--gold-accent); border-radius: 4px; }
        h2 { color: var(--titanium-silver); margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        label { display: block; margin-bottom: 0.5rem; color: var(--gold-accent); font-size: 0.85rem; text-transform: uppercase; }
        input, textarea, select { width: 100%; padding: 0.8rem; margin-bottom: 1.5rem; background: #1a1d28; border: 1px solid #2a2e3d; color: white; }
        .checkbox-group { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }
        .checkbox-group input { width: auto; margin-bottom: 0; }
        button { background: transparent; color: var(--gold-accent); border: 1px solid var(--gold-accent); padding: 1rem 2rem; text-transform: uppercase; cursor: pointer; transition: 0.3s; width: 100%; letter-spacing: 2px; }
        button:hover { background: var(--gold-accent); color: var(--bg-color); font-weight: bold; }
        .back-link { display: block; text-align: center; color: var(--text-muted); text-decoration: none; font-size: 0.8rem; margin-top: 2rem; text-transform: uppercase; letter-spacing: 1px; }
        .back-link:hover { color: var(--gold-accent); }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Studio: Equipment Intake</h2>
        <form id="equipmentForm">
            <input type="hidden" id="entryType" value="equipment_manifest">
            
            <label>Item Name</label> 
            <input type="text" id="itemName" placeholder="e.g. Titanium Studio Camera A1" required>
            
            <label>Serial Number</label> 
            <input type="text" id="serialNumber" placeholder="e.g. TS-CAM-001" required>
            
            <label>Purchase Value (USD)</label> 
            <input type="number" id="purchaseValue" placeholder="e.g. 45000" step="0.01" required>
            
            <div class="checkbox-group">
                <input type="checkbox" id="uccLienStatus">
                <label for="uccLienStatus" style="margin-bottom: 0;">UCC-1 Lien Active</label>
            </div>
            
            <button type="submit">Log Asset to Starchive</button>
        </form>
        <a href="/" class="back-link">Return to Master Directory</a>
    </div>

    <script>
        document.getElementById('equipmentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                type: 'equipment_manifest',
                data: {
                    item_name: document.getElementById('itemName').value,
                    serial_number: document.getElementById('serialNumber').value,
                    purchase_value: parseFloat(document.getElementById('purchaseValue').value),
                    ucc_lien_active: document.getElementById('uccLienStatus').checked
                }
            };
            
            try {
                const response = await fetch('/.netlify/functions/get-post', {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if(response.ok) { 
                    alert("Asset Logged. Titanium Inventory Updated."); 
                    e.target.reset(); 
                } else {
                    alert("Connection to Starchive failed. Please try again later.");
                }
            } catch (err) {
                console.error(err);
                alert("Network error. Ensure your Netlify functions are deployed.");
            }
        });
    </script>
</body>
</html>
